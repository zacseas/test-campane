name: Aggiorna Dati
on:
  workflow_dispatch: 
  schedule:
    - cron: '0 0 * * *' 

jobs:
  scheduled:
    runs-on: ubuntu-latest
    
    # Questa sezione dice a GitHub di forzare l'uso di Node 24 
    # e di non lamentarsi se le azioni sono "vecchie"
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Check out repo
        uses: actions/checkout@v4 # La v4 è quella corretta
        
      - name: Fetch data
        uses: githubocto/flat@v3
        with:
          http_url: 'IL_TUO_LINK_CSV_DI_GOOGLE'
          downloaded_filename: campane.csv
