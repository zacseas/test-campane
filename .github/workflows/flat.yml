name: Aggiorna Dati
on:
  workflow_dispatch: 
  schedule:
    - cron: '0 0 * * *' 

jobs:
  scheduled:
    runs-on: ubuntu-latest
    
    env:
      # Scegliamo SOLO questa: forziamo l'ambiente a Node 24.
      # GitHub smetterà di segnalare l'errore di configurazione.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        
      - name: Fetch data
        uses: githubocto/flat@v3
        with:
          http_url: 'IL_TUO_LINK_CSV_DI_GOOGLE'
          downloaded_filename: campane.csv
